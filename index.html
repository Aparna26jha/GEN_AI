<!DOCTYPE html>
<html>
<head>
    <title>GenAI Assistant</title>
</head>
<body>

    <h2>Ask a Question</h2>

    <form method="POST">
        <input type="text" name="question" required>
        <button type="submit">Ask</button>
    </form>

    <h3>Answer:</h3>
    <p>{{ answer }}</p>

    <h3>Retrieved Context:</h3>
    <p>{{ context }}</p>

</body>
</html>
